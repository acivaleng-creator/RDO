name: Build RDO Oficial

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONUTF8: 1
      PYTHONIOENCODING: utf-8
      LANG: en_US.UTF-8
    steps:
      - name: Checkout do Codigo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Instalar Libs Atualizadas
        run: |
          # Liberamos a versao do flet para corrigir o bug interno de leitura
          pip install --upgrade flet reportlab pillow
          pip install --upgrade requests urllib3 charset-normalizer chardet
          # Resolve erro do ReportLab
          SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
          echo "import builtins; builtins.unicode = str" > $SITE_PACKAGES/sitecustomize.py

      - name: Vacina contra Erros de Leitura
        run: |
          # 1. Encontra qualquer arquivo com 0 bytes e preenche com um comentário para o Flet não travar
          find . -type f -empty -print -exec sh -c 'echo "# vazio" > {}' \;
          # 2. Converte arquivos de Windows para o padrão do Linux
          find . -type f -name "*.py" -o -name "*.toml" -o -name "*.txt" | xargs sed -i 's/\r$//' || true

      - name: Executar Build APK
        run: |
          flet build apk --verbose

      - name: Upload do Instalador
        uses: actions/upload-artifact@v4
        with:
          name: RDO_Grupo_App
          path: build/apk/*.apk
